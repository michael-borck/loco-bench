site_name: loco-bench
site_url: https://locobench.org/
site_description: "I have X GB of VRAM — what's the best model I can run?"
repo_url: https://github.com/michael-borck/loco-bench
repo_name: michael-borck/loco-bench

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.plot.ly/plotly-2.35.2.min.js
  - javascripts/benchmark_data.js
  - javascripts/chart_theme.js
  - javascripts/charts_overview.js
  - javascripts/charts_quality.js
  - javascripts/charts_speed.js
  - javascripts/charts_efficiency.js

nav:
  - Home: index.md
  - Benchmarking Guide: guide.md
  - Results:
    - Quality: quality.md
    - Speed: speed.md
    - Bang per Bit: bang-per-bit.md
  - Hardware:
    - Colmena: colmena.md
    - VRAM Tiers: tiers.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
